<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>2段メモ帳</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <header class="toolbar">
        <h1>2段メモ帳</h1>
        <div class="toolbar-actions">
          <button id="shareButton" type="button">共有リンクコピー</button>
          <label class="sync-toggle">
            <input id="syncScroll" type="checkbox" checked>
            <span id="syncLabel">スクロール連動</span>
          </label>
        </div>
      </header>

      <p id="shareStatus" class="share-status" role="status" aria-live="polite"></p>

      <section class="notes" aria-label="左右独立メモ">
        <article class="note-panel">
          <label for="leftNote">左段</label>
          <textarea id="leftNote" spellcheck="false" placeholder="左側のメモ"></textarea>
        </article>

        <article class="note-panel">
          <label for="rightNote">右段</label>
          <textarea id="rightNote" spellcheck="false" placeholder="右側のメモ"></textarea>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
